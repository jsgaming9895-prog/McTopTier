<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McTopTier | Custom Edition</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        :root {
            --mc-green: #55FF55;
            --mc-bg: #1e1e1e;
            --mc-panel: #313131;
            --mc-border: #000;
        }

        body {
            background-color: var(--mc-bg);
            color: white;
            font-family: 'Minecraftia', sans-serif;
            margin: 0;
            image-rendering: pixelated;
        }

        /* Nav Bar with SVG Icons */
        .mc-nav {
            background: #484848;
            border-bottom: 4px solid var(--mc-border);
            display: flex;
            overflow-x: auto;
            padding: 10px;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-btn {
            background: #7e7e7e;
            border: 3px solid var(--mc-border);
            box-shadow: inset -3px -3px #555, inset 3px 3px #ffffff33;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #DDD;
            text-shadow: 2px 2px #000;
            font-size: 9px;
            white-space: nowrap;
        }

        .nav-btn.active {
            background: #00AA00;
            color: var(--mc-green);
        }

        .icon-svg { width: 20px; height: 20px; }

        /* Main Table Area */
        .container { padding: 15px; }
        .mc-table {
            width: 100%;
            border-collapse: collapse;
            border: 4px solid var(--mc-border);
            background: var(--mc-panel);
        }

        .mc-table th { background: #252525; padding: 12px; font-size: 10px; color: #AAA; text-align: left; }
        .mc-table td { padding: 12px 10px; border: 2px solid #222; }

        .player-box { display: flex; align-items: center; gap: 10px; }
        .head { width: 28px; height: 28px; border: 2px solid #000; }

        /* Tiers with SVG Icons */
        .tiers-flex { display: flex; gap: 12px; }
        .mode-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tier-icon { width: 24px; height: 24px; }
        .tier-label { font-size: 8px; background: #000; padding: 2px 5px; border: 1px solid #555; }

        /* GUI Popup */
        #gui-blur { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        #mc-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #C6C6C6; border: 4px solid #000; box-shadow: inset -4px -4px #555, inset 4px 4px #FFF;
            padding: 25px; width: 280px; z-index: 1001; text-align: center;
        }
    </style>
</head>
<body>

    <div class="mc-nav">
        <div class="nav-btn active"><img src="vanilla.svg" class="icon-svg">Overall</div>
        <div class="nav-btn"><img src="uhc.svg" class="icon-svg">UHC</div>
        <div class="nav-btn"><img src="pot.svg" class="icon-svg">Pot</div>
        <div class="nav-btn"><img src="sword.svg" class="icon-svg">Sword</div>
        <div class="nav-btn"><img src="https://www.google.com/imgres?q=mctiers%20icons&imgurl=x-raw-image%3A%2F%2F%2Fa9a33e583cd0b2aab8cf638f29ec759d05f3beba3c489d962731e07322d34447&imgrefurl=https%3A%2F%2Fwww.mctiers.it%2F&docid=MRHSP_j_isiQGM&tbnid=qrLQPFg-o6mAGM&vet=12ahUKEwi0ht7uoqCUAxUWRmwGHdtpBB0QnPAOegQIHBAB..i&w=800&h=800&hcb=2&ved=2ahUKEwi0ht7uoqCUAxUWRmwGHdtpBB0QnPAOegQIHBAB" class="icon-svg">Nether</div>
        <div class="nav-btn"><img src="smp.svg" class="icon-svg">SMP</div>
    </div>

    <div class="container">
        <h2 style="text-align: center; text-shadow: 2px 2px #000; color: var(--mc-green);">OVERALL RANKINGS</h2>
        <table class="mc-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Tiers</th>
                </tr>
            </thead>
            <tbody>
                <tr onclick="showStats('Smitenesss', 400)">
                    <td>1</td>
                    <td>
                        <div class="player-box">
                            <img src="https://minotar.net/helm/Smitenesss/32.png" class="head">
                            <span style="color:var(--mc-green)">Smitenesss</span>
                        </div>
                    </td>
                    <td>
                        <div class="tiers-flex">
                            <div class="mode-unit"><img src="https://www.google.com/imgres?q=mctier%20gamemode%20icon&imgurl=https%3A%2F%2Ftiermaker.com%2Fimages%2Fmedia%2Ftemplate_images%2F2024%2F16172991%2Fmctiers--subtiers-gamemodes-16172991%2Fmace.png&imgrefurl=https%3A%2F%2Ftiermaker.com%2Fcreate%2Fmctiers--subtiers-gamemodes-16172991&docid=QqTesk1SKR35WM&tbnid=A9Cb5elMpKDU2M&vet=12ahUKEwjT68TCoaCUAxWFSWwGHSFsA4UQnPAOegQIJBAB..i&w=300&h=300&hcb=2&ved=2ahUKEwjT68TCoaCUAxWFSWwGHSFsA4UQnPAOegQIJBAB" class="tier-icon"><span class="tier-label">HT1</span></div>
                            <div class="mode-unit"><img src="mace.svg" class="tier-icon"><span class="tier-label">LT1</span></div>
                        </div>
                    </td>
                </tr>
                <tr onclick="showStats('SaumyaXtreme', 280)">
                    <td>2</td>
                    <td>
                        <div class="player-box">
                            <img src="https://minotar.net/helm/SaumyaXtreme/32.png" class="head">
                            <span style="color:#FF5555">SaumyaXtreme</span>
                        </div>
                    </td>
                    <td>
                        <div class="tiers-flex">
                            <div class="mode-unit"><img src="axe.svg" class="tier-icon"><span class="tier-label">HT2</span></div>
                            <div class="mode-unit"><img src="smp.svg" class="tier-icon"><span class="tier-label">LT3</span></div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="gui-blur" onclick="hide()"></div>
    <div id="mc-modal">
        <h2 id="p-name" style="color:#333; margin:0;">Name</h2>
        <div style="background:#000; padding:15px; margin-top:15px; border:2px solid #555;">
            <span style="color:#AAA; font-size:10px;">POINTS</span><br>
            <span id="p-points" style="color:var(--mc-green); font-size:30px;">0</span>
        </div>
        <button onclick="hide()" style="width:100%; margin-top:15px; background:#7e7e7e; border:3px solid #000; color:white; padding:8px; font-family:'Minecraftia'; cursor:pointer;">DONE</button>
    </div>

    <script>
        function showStats(name, pts) {
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-points').innerText = pts;
            document.getElementById('mc-modal').style.display = 'block';
            document.getElementById('gui-blur').style.display = 'block';
        }
        function hide() {
            document.getElementById('mc-modal').style.display = 'none';
            document.getElementById('gui-blur').style.display = 'none';
        }
    </script>
</body>
</html>
