<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McTopTier | Leaderboard</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #111;
            --nav-bg: #1a1a1a;
            --text-main: #eee;
            --text-dim: #888;
            --accent-green: #00ff88;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Top Navigation Bar */
        .nav-bar {
            background: var(--nav-bg);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid #222;
        }
        .nav-item {
            padding: 12px 20px;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            white-space: nowrap;
        }
        .nav-item.active {
            color: var(--accent-green);
            border-bottom: 2px solid var(--accent-green);
        }

        /* Search & Title */
        .container { padding: 15px; }
        .title { text-align: center; font-size: 18px; margin-bottom: 15px; }
        .search {
            width: 100%;
            background: #151515;
            border: 1px solid #333;
            padding: 10px;
            color: white;
            border-radius: 5px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* Leaderboard Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-dim); font-size: 11px; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 12px 10px; border-bottom: 1px solid #181818; font-size: 13px; }

        .player-box { display: flex; align-items: center; gap: 8px; }
        .skin { width: 26px; height: 26px; image-rendering: pixelated; border-radius: 3px; }
        
        /* ICONS STYLING (Photo Jaisa) */
        .modes-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .icon-group { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-width: 25px;
        }
        .mc-icon {
            width: 18px;
            height: 18px;
            image-rendering: pixelated;
        }
        .tier-label {
            font-size: 7px;
            font-weight: bold;
            color: #ccc;
            margin-top: 2px;
            text-transform: uppercase;
        }

        /* Modal popup */
        #modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; padding:30px; border:1px solid var(--accent-green); z-index:100; text-align:center; border-radius:10px; width:80%; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:90; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="nav-item">Core</div>
        <div class="nav-item active">Overall</div>
        <div class="nav-item">UHC</div>
        <div class="nav-item">Pot</div>
        <div class="nav-item">Vanilla</div>
        <div class="nav-item">NethCP</div>
        <div class="nav-item">SMP</div>
        <div class="nav-item">Sword</div>
    </div>

    <div class="container">
        <div class="title">OVERALL Rankings</div>
        <input type="text" class="search" placeholder="Search player...">

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>PLAYER</th>
                    <th>REGION</th>
                    <th>MODES</th>
                </tr>
            </thead>
            <tbody>
                <tr onclick="show('Smitenesss', 'EU', {'Crystal':'HT1', 'Sword':'LT1', 'Potion':'HT2'})">
                    <td style="color:#666">1</td>
                    <td>
                        <div class="player-box">
                            <img class="skin" src="https://minotar.net/helm/Smitenesss/32.png">
                            <span style="color:var(--accent-green)">Smitenesss</span>
                        </div>
                    </td>
                    <td style="color:#888">EU</td>
                    <td>
                        <div class="modes-container">
                            <div class="icon-group">
                                <img src="https://minecraft.wiki/images/End_Crystal_JE2_BE2.png" class="mc-icon">
                                <span class="tier-label">HT1</span>
                            </div>
                            <div class="icon-group">
                                <img src="https://minecraft.wiki/images/Netherite_Sword_JE2_BE2.png" class="mc-icon">
                                <span class="tier-label">LT1</span>
                            </div>
                            <div class="icon-group">
                                <img src="https://minecraft.wiki/images/Potion_of_Healing_JE2_BE2.png" class="mc-icon">
                                <span class="tier-label">HT2</span>
                            </div>
                        </div>
                    </td>
                </tr>

                <tr onclick="show('SaumyaXtreme', 'AS', {'Axe':'HT2', 'Pearl':'LT3'})">
                    <td style="color:#666">2</td>
                    <td>
                        <div class="player-box">
                            <img class="skin" src="https://minotar.net/helm/SaumyaXtreme/32.png">
                            <span style="color:#ff4444">SaumyaXtreme</span>
                        </div>
                    </td>
                    <td style="color:#888">AS</td>
                    <td>
                        <div class="modes-container">
                            <div class="icon-group">
                                <img src="https://minecraft.wiki/images/Netherite_Axe_JE2_BE2.png" class="mc-icon">
                                <span class="tier-label">HT2</span>
                            </div>
                            <div class="icon-group">
                                <img src="https://minecraft.wiki/images/Ender_Pearl_JE2_BE2.png" class="mc-icon">
                                <span class="tier-label">LT3</span>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="overlay" onclick="hide()"></div>
    <div id="modal">
        <h2 id="p-name"></h2>
        <h1 style="color:var(--accent-green); font-size:40px;"><span id="p-points">0</span></h1>
        <p style="color:#888">Total Points</p>
        <button onclick="hide()" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:5px; margin-top:10px;">Close</button>
    </div>

    <script>
        const pts = {'LT5':20,'HT5':40,'LT4':60,'HT4':80,'LT3':100,'HT3':120,'LT2':140,'HT2':160,'LT1':180,'HT1':200};

        function show(name, reg, tiersObj) {
            let total = 0;
            for(let key in tiersObj) {
                total += pts[tiersObj[key]] || 0;
            }
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-points').innerText = total;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function hide() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
