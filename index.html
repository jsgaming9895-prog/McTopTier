<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McTopTier Leaderboard</title>
    <style>
        :root { --bg: #0a0a0a; --card: #111; --accent: #00ff88; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        
        /* Navigation Bar */
        .nav-container { display: flex; background: #151515; padding: 10px; gap: 10px; overflow-x: auto; border-bottom: 1px solid #222; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; min-width: 60px; opacity: 0.7; cursor: pointer; }
        .nav-btn.active { opacity: 1; border-bottom: 2px solid var(--accent); }
        .nav-icon { width: 22px; height: 22px; object-fit: contain; margin-bottom: 4px; }
        .nav-text { font-size: 9px; text-transform: uppercase; font-weight: bold; }

        /* Rankings Table */
        .main-content { padding: 15px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th { text-align: left; padding: 12px; color: #666; font-size: 11px; border-bottom: 1px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }

        /* Player Sections */
        .player-info { display: flex; align-items: center; gap: 8px; }
        .skin-head { width: 24px; height: 24px; border-radius: 3px; }

        /* Tier Icons (Exactly as you asked) */
        .modes-wrapper { display: flex; gap: 12px; }
        .mode-item { display: flex; flex-direction: column; align-items: center; }
        .tier-img { width: 24px; height: 24px; image-rendering: pixelated; margin-bottom: 2px; }
        .tier-tag { font-size: 8px; background: #222; padding: 1px 4px; border-radius: 3px; color: #ccc; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="nav-btn"><img src="download.png" class="nav-icon"><span class="nav-text">Core</span></div>
        <div class="nav-btn active"><img src="images.png" class="nav-icon"><span class="nav-text">Overall</span></div>
        <div class="nav-btn"><img src="download (5).jpeg" class="nav-icon"><span class="nav-text">UHC</span></div>
        <div class="nav-btn"><img src="download (1).png" class="nav-icon"><span class="nav-text">Pot</span></div>
        <div class="nav-btn"><img src="download (6).jpeg" class="nav-icon"><span class="nav-text">Vanilla</span></div>
        <div class="nav-btn"><img src="download (8).jpeg" class="nav-icon"><span class="nav-text">Nethpot</span></div>
        <div class="nav-btn"><img src="download (7).jpeg" class="nav-icon"><span class="nav-text">SMP</span></div>
    </div>

    <div class="main-content">
        <h3 style="text-align:center; color: #888; font-weight: normal;">OVERALL Rankings</h3>
        <table>
            <thead>
                <tr>
                    <th width="30">#</th>
                    <th>PLAYER</th>
                    <th>REGION</th>
                    <th>MODES</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="color:#444">1</td>
                    <td>
                        <div class="player-info">
                            <img src="https://minotar.net/helm/Smitenesss/32.png" class="skin-head">
                            <span style="color:var(--accent); font-weight:bold;">Smitenesss</span>
                        </div>
                    </td>
                    <td style="color:#777">EU</td>
                    <td>
                        <div class="modes-wrapper">
                            <div class="mode-item">
                                <img src="download (8).jpeg" class="tier-img" alt="Helmet">
                                <span class="tier-tag">HT1</span>
                            </div>
                            <div class="mode-item">
                                <img src="download.png" class="tier-img" alt="Mace">
                                <span class="tier-tag">LT1</span>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
