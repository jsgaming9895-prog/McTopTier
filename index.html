<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McTopTier | Leaderboard</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #151515;
            --text-color: #ffffff;
            --accent-green: #00ff88;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 20px;
            text-align: center;
        }
        input {
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            width: 80%;
            border-radius: 5px;
        }

        /* Leaderboard Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #1a1a1a;
            color: #888;
            padding: 15px;
            text-align: left;
            text-transform: uppercase;
            font-size: 12px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #222;
        }

        .player-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skin-head {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
        }

        .rank-num { font-weight: bold; color: #aaa; }
        .player-name { font-weight: bold; cursor: pointer; color: #3498db; }
        .region { color: #888; }

        /* Points Logic & Modal */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 20px;
            border: 2px solid var(--accent-green);
            border-radius: 15px;
            z-index: 100;
            width: 300px;
            text-align: center;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 99;
        }

        .tier-badge {
            background: #222;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-right: 5px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>OVERALL Rankings</h1>
    </div>

    <div class="search-container">
        <input type="text" placeholder="Search player...">
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Player</th>
                <th>Region</th>
                <th>Modes</th>
            </tr>
        </thead>
        <tbody id="leaderboard">
            <tr onclick="showStats('Smitenesss', 'EU', 'HT1', 'LT1')">
                <td class="rank-num">1</td>
                <td>
                    <div class="player-cell">
                        <img class="skin-head" src="https://minotar.net/helm/Smitenesss/32.png" alt="skin">
                        <span class="player-name" style="color: #00ff88;">Smitenesss</span>
                    </div>
                </td>
                <td class="region">EU</td>
                <td>
                    <span class="tier-badge">HT1</span>
                    <span class="tier-badge">LT1</span>
                </td>
            </tr>
            <tr onclick="showStats('SaumyaXtreme', 'AS', 'HT2', 'LT3')">
                <td class="rank-num">2</td>
                <td>
                    <div class="player-cell">
                        <img class="skin-head" src="https://minotar.net/helm/SaumyaXtreme/32.png" alt="skin">
                        <span class="player-name" style="color: #ff4444;">SaumyaXtreme</span>
                    </div>
                </td>
                <td class="region">AS</td>
                <td>
                    <span class="tier-badge">HT2</span>
                    <span class="tier-badge">LT3</span>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <h2 id="m-name"></h2>
        <p id="m-region"></p>
        <hr style="border: 0.5px solid #333">
        <h3 style="color: var(--accent-green)">Points: <span id="m-points">0</span></h3>
        <div id="m-tiers" style="margin-top: 10px;"></div>
        <button onclick="closeModal()" style="margin-top: 15px; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">Close</button>
    </div>

    <script>
        const pointsTable = {
            'LT5': 20, 'HT5': 40, 'LT4': 60, 'HT4': 80,
            'LT3': 100, 'HT3': 120, 'LT2': 140, 'HT2': 160,
            'LT1': 180, 'HT1': 200
        };

        function showStats(name, region, ...tiers) {
            let total = 0;
            let tierHtml = '';
            
            tiers.forEach(t => {
                total += pointsTable[t] || 0;
                tierHtml += `<span class="tier-badge">${t} (${pointsTable[t]} pts)</span> `;
            });

            document.getElementById('m-name').innerText = name;
            document.getElementById('m-region').innerText = "Region: " + region;
            document.getElementById('m-points').innerText = total;
            document.getElementById('m-tiers').innerHTML = tierHtml;
            
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
