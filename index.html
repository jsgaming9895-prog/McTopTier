<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCTiers Leaderboard</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; }
        .leaderboard { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .leaderboard th, .leaderboard td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        .leaderboard th { background-color: #2c2c2c; }
        .player-row:hover { background-color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MCTiers Rankings</h1>
        <table class="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Region</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example Row -->
                <tr class="player-row">
                    <td>1</td>
                    <td>Marlowww</td>
                    <td>NA</td>
                    <td>50</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
