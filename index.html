<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McTopTier Leaderboard</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #111;
            --accent: #00ff88;
            --text: #eee;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* Navigation Icons Bar */
        .nav-container {
            display: flex;
            background: #151515;
            padding: 10px;
            gap: 15px;
            overflow-x: auto;
            border-bottom: 1px solid #222;
            justify-content: center;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
            opacity: 0.6;
            cursor: pointer;
        }

        .nav-btn.active { opacity: 1; border-bottom: 2px solid var(--accent); }

        .nav-icon { width: 24px; height: 24px; margin-bottom: 5px; }

        .nav-text { font-size: 9px; text-transform: uppercase; }

        /* Table Styling */
        .main-content { padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th { background: #181818; color: #888; font-size: 11px; text-align: left; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #1c1c1c; vertical-align: middle; }

        .player-cell { display: flex; align-items: center; gap: 10px; }
        .skin-head { width: 30px; height: 30px; border-radius: 4px; }

        /* Tier and Mode Icons Styling */
        .modes-wrapper { display: flex; gap: 12px; }
        .mode-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        
        /* Photo ke jaisa icon size aur look */
        .tier-img { 
            width: 22px; 
            height: 22px; 
            image-rendering: pixelated; 
        }
        
        .tier-tag { 
            font-size: 8px; 
            font-weight: bold; 
            color: #bbb; 
            background: #222; 
            padding: 1px 4px; 
            border-radius: 3px;
        }

        .rank-num { font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="nav-btn"><img src="download.png" class="nav-icon"><span class="nav-text">Core</span></div>
        <div class="nav-btn active"><img src="images.png" class="nav-icon"><span class="nav-text">Overall</span></div>
        <div class="nav-btn"><img src="download (5).jpeg" class="nav-icon"><span class="nav-text">UHC</span></div>
        <div class="nav-btn"><img src="download (1).png" class="nav-icon"><span class="nav-text">Pot</span></div>
        <div class="nav-btn"><img src="download (6).jpeg" class="nav-icon"><span class="nav-text">Vanilla</span></div>
        <div class="nav-btn"><img src="download (8).jpeg" class="nav-icon"><span class="nav-text">Nethpot</span></div>
        <div class="nav-btn"><img src="download (7).jpeg" class="nav-icon"><span class="nav-text">SMP</span></div>
        <div class="nav-btn"><img src="download (6).jpeg" class="nav-icon"><span class="nav-text">Sword</span></div>
    </div>

    <div class="main-content">
        <h3 style="text-align: center; margin-bottom: 20px;">OVERALL Rankings</h3>
        <table>
            <thead>
                <tr>
                    <th width="50">#</th>
                    <th>Player</th>
                    <th>Region</th>
                    <th>Modes</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="rank-num">1</td>
                    <td>
                        <div class="player-cell">
                            <img src="https://minotar.net/helm/Smitenesss/32.png" class="skin-head">
                            <span style="color:var(--accent)">Smitenesss</span>
                        </div>
                    </td>
                    <td style="color:#888">EU</td>
                    <td>
                        <div class="modes-wrapper">
                            <div class="mode-item">
                                <img src="download (8).jpeg" class="tier-img">
                                <span class="tier-tag">HT1</span>
                            </div>
                            <div class="mode-item">
                                <img src="download.png" class="tier-img">
                                <span class="tier-tag">LT1</span>
                            </div>
                            <div class="mode-item">
                                <img src="download (5).jpeg" class="tier-img">
                                <span class="tier-tag">HT2</span>
                            </div>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td class="rank-num">2</td>
                    <td>
                        <div class="player-cell">
                            <img src="https://minotar.net/helm/SaumyaXtreme/32.png" class="skin-head">
                            <span style="color:#ff4444">SaumyaXtreme</span>
                        </div>
                    </td>
                    <td style="color:#888">AS</td>
                    <td>
                        <div class="modes-wrapper">
                            <div class="mode-item">
                                <img src="download (7).jpeg" class="tier-img">
                                <span class="tier-tag">LT3</span>
                            </div>
                            <div class="mode-item">
                                <img src="download (6).jpeg" class="tier-img">
                                <span class="tier-tag">HT2</span>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
